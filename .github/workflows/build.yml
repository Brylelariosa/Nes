name: Build Minecraft NES ROM

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install cc65
      run: sudo apt-get update && sudo apt-get install -y cc65
    - name: Generate CHR & Compile
      run: make
    - uses: actions/upload-artifact@v4
      with:
        name: minecraft-nes
        path: minecraft.nes
        retention-days: 14
